<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" font-family="-apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="@broberg/ai-sdk architecture — the layer cake">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#3a2c20" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- canvas -->
  <rect x="0" y="0" width="920" height="560" rx="20" fill="#f7f2e8"/>

  <!-- title -->
  <text x="40" y="50" font-size="24" font-weight="700" fill="#3a2c20">@broberg/ai-sdk — the layer cake</text>
  <text x="40" y="74" font-size="13.5" fill="#8a7a66">A request falls down the stack; the result (with cost) bubbles back up.</text>

  <!-- LAYER template: card (x=40,w=640) + accent bar + label + content + side annotation -->
  <!-- 1 Capabilities -->
  <g filter="url(#shadow)">
    <rect x="40" y="96" width="640" height="64" rx="11" fill="#fffdf9" stroke="#ecdcc4"/>
    <rect x="40" y="96" width="9" height="64" rx="4.5" fill="#c8512a"/>
  </g>
  <text x="68" y="124" font-size="15.5" font-weight="700" fill="#c8512a">Capabilities</text>
  <text x="68" y="143" font-size="11.5" fill="#7c6c58">AiClient — what you call</text>
  <text x="250" y="123" font-size="13" font-family="ui-monospace, Menlo, monospace" fill="#3a2c20">chat · vision · translate · image</text>
  <text x="250" y="143" font-size="13" font-family="ui-monospace, Menlo, monospace" fill="#3a2c20">embedding · transcribe · contracts.*</text>
  <text x="700" y="132" font-size="13" fill="#a8987f">← what you call</text>

  <!-- 2 Routing -->
  <g filter="url(#shadow)">
    <rect x="40" y="172" width="640" height="64" rx="11" fill="#fffdf9" stroke="#ecdcc4"/>
    <rect x="40" y="172" width="9" height="64" rx="4.5" fill="#cf6a2a"/>
  </g>
  <text x="68" y="200" font-size="15.5" font-weight="700" fill="#cf6a2a">Routing</text>
  <text x="68" y="219" font-size="11.5" fill="#7c6c58">tiers</text>
  <text x="250" y="199" font-size="13" font-family="ui-monospace, Menlo, monospace" fill="#3a2c20">Tier → resolveTier() → TierSpec</text>
  <text x="250" y="219" font-size="13" font-family="ui-monospace, Menlo, monospace" fill="#3a2c20">(provider, model, transport)</text>
  <text x="700" y="208" font-size="13" fill="#a8987f">← which model</text>

  <!-- 3 Providers -->
  <g filter="url(#shadow)">
    <rect x="40" y="248" width="640" height="64" rx="11" fill="#fffdf9" stroke="#ecdcc4"/>
    <rect x="40" y="248" width="9" height="64" rx="4.5" fill="#d68a2c"/>
  </g>
  <text x="68" y="276" font-size="15.5" font-weight="700" fill="#d68a2c">Providers</text>
  <text x="68" y="295" font-size="11.5" fill="#7c6c58">ProviderAdapter</text>
  <text x="250" y="275" font-size="13" font-family="ui-monospace, Menlo, monospace" fill="#3a2c20">anthropic · openai · gemini · deepinfra</text>
  <text x="250" y="295" font-size="13" font-family="ui-monospace, Menlo, monospace" fill="#3a2c20">openrouter · fal   (+ tool normalization)</text>
  <text x="700" y="284" font-size="13" fill="#a8987f">← how to talk to it</text>

  <!-- 4 Transport -->
  <g filter="url(#shadow)">
    <rect x="40" y="324" width="640" height="56" rx="11" fill="#fffdf9" stroke="#ecdcc4"/>
    <rect x="40" y="324" width="9" height="56" rx="4.5" fill="#cfa133"/>
  </g>
  <text x="68" y="350" font-size="15.5" font-weight="700" fill="#b98a1f">Transport</text>
  <text x="68" y="368" font-size="11.5" fill="#7c6c58">http | subprocess</text>
  <text x="250" y="357" font-size="13" font-family="ui-monospace, Menlo, monospace" fill="#3a2c20">httpTransport · subprocessTransport (claude -p)</text>
  <text x="700" y="356" font-size="13" fill="#a8987f">← how bytes travel</text>

  <!-- 5 Cost -->
  <g filter="url(#shadow)">
    <rect x="40" y="392" width="640" height="64" rx="11" fill="#fffdf9" stroke="#ecdcc4"/>
    <rect x="40" y="392" width="9" height="64" rx="4.5" fill="#8a9a3a"/>
  </g>
  <text x="68" y="420" font-size="15.5" font-weight="700" fill="#6f7e2c">Cost</text>
  <text x="68" y="439" font-size="11.5" fill="#7c6c58">first-class</text>
  <text x="250" y="419" font-size="13" font-family="ui-monospace, Menlo, monospace" fill="#3a2c20">Usage · computeCost · pricing · Budget</text>
  <text x="250" y="439" font-size="13" font-family="ui-monospace, Menlo, monospace" fill="#3a2c20">CostSink (upmetrics · discord · sqlite)</text>
  <text x="700" y="428" font-size="13" fill="#a8987f">← what it cost</text>

  <!-- 6 Schema -->
  <g filter="url(#shadow)">
    <rect x="40" y="468" width="640" height="52" rx="11" fill="#fffdf9" stroke="#ecdcc4"/>
    <rect x="40" y="468" width="9" height="52" rx="4.5" fill="#4f8a6a"/>
  </g>
  <text x="68" y="492" font-size="15.5" font-weight="700" fill="#3f775a">Schema</text>
  <text x="68" y="510" font-size="11.5" fill="#7c6c58">Zod boundary</text>
  <text x="250" y="500" font-size="13" font-family="ui-monospace, Menlo, monospace" fill="#3a2c20">Zod on every public input + AiConfig</text>
  <text x="700" y="499" font-size="13" fill="#a8987f">← validated boundary</text>

  <!-- down arrow (request) -->
  <g stroke="#c8512a" stroke-width="2" fill="none" opacity="0.55">
    <line x1="876" y1="104" x2="876" y2="508"/>
    <polyline points="870,498 876,512 882,498"/>
  </g>
  <text x="893" y="320" font-size="12" fill="#c8512a" opacity="0.7" transform="rotate(90 893 320)">request ↓ · result ↑</text>
</svg>
